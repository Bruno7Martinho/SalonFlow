<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SalonFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #005a8c 0%, #0088cc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 90, 140, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-img {
            max-width: 300px;
            height: auto;
            display: inline-block;
        }

        .login-box h3 {
            text-align: center;
            color: #2c6e9e;
            margin-bottom: 30px;
            font-weight: normal;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cce7f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #005a8c;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #005a8c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #0088cc;
            transform: translateY(-2px);
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .hidden {
            display: none;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #2c6e9e;
        }

        .info-text i {
            color: #005a8c;
        }

        .security-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #28a745;
        }

        .demo-credentials {
            background: #f0f7fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.8rem;
            text-align: center;
        }

        .demo-credentials p {
            margin: 5px 0;
            color: #2c6e9e;
        }

        .demo-credentials strong {
            color: #005a8c;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <img src="img/logo.png" alt="SalonFlow" class="logo-img" onerror="this.src='https://via.placeholder.com/180x60?text=SalonFlow'">
        </div>
        <h3>Sistema de Gerenciamento de Salões de Beleza</h3>
        
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Senha:</label>
                <input type="password" id="password" class="form-control" placeholder="Sua senha" required autocomplete="current-password">
            </div>
            
            <button type="submit" id="loginBtn" class="btn">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <div id="alertMessage" class="alert hidden"></div>
        
        

        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Sistema seguro com criptografia
        </div>
        
        <div class="security-badge">
            <i class="fas fa-check-circle"></i> Dados protegidos
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO SUPABASE (USANDO A VARIÁVEL GLOBAL)
        // ============================================
        const SUPABASE_URL = 'https://opmpodjqdxtpdolvrzln.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RYuRxp9GWjfyEMwE3bjMCg_lYIJOg5a';
        
        // Usar a variável global 'supabase' já criada pelo script
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // VARIÁVEIS
        // ============================================
        let isLoading = false;

        // ============================================
        // FUNÇÕES DE AUTENTICAÇÃO
        // ============================================
        
        async function loginWithSupabase(email, password) {
            try {
                console.log('Tentando login com:', email);
                
                // Login com Supabase Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (authError) {
                    console.error('Erro no auth:', authError);
                    throw authError;
                }
                
                console.log('Auth success:', authData.user);
                
                if (authData.user) {
                    // Buscar se é admin (tabela usuarios_admin)
                    const { data: adminData, error: adminError } = await supabaseClient
                        .from('usuarios_admin')
                        .select('*')
                        .eq('email', email)
                        .maybeSingle();
                    
                    console.log('Admin data:', adminData);
                    
                    if (adminData) {
                        const userSession = {
                            id: adminData.id,
                            nome: adminData.nome,
                            email: adminData.email,
                            role: 'admin'
                        };
                        sessionStorage.setItem('barberflow_user', JSON.stringify(userSession));
                        return { success: true, role: 'admin', redirectTo: 'admin.html' };
                    }
                    
                    // Buscar se é profissional
                    const { data: profissionalData, error: profissionalError } = await supabaseClient
                        .from('barbeiros')
                        .select('*, barbearias(id, nome)')
                        .eq('email', email)
                        .maybeSingle();
                    
                    console.log('Profissional data:', profissionalData);
                    
                    if (profissionalData) {
                        const userSession = {
                            id: profissionalData.id,
                            nome: profissionalData.nome,
                            email: profissionalData.email,
                            barbearia_id: profissionalData.barbearia_id,
                            role: 'profissional',
                            barbearia_nome: profissionalData.barbearias?.nome
                        };
                        sessionStorage.setItem('barberflow_user', JSON.stringify(userSession));
                        return { success: true, role: 'profissional', redirectTo: 'index.html' };
                    }
                    
                    return { success: false, error: 'Usuário não autorizado - não encontrado nas tabelas' };
                }
                
                return { success: false, error: 'Falha na autenticação' };
                
            } catch (error) {
                console.error('Erro detalhado no login:', error);
                return { success: false, error: error.message };
            }
        }

        // ============================================
        // FUNÇÕES DE UI
        // ============================================
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.classList.remove('hidden');
            
            setTimeout(() => {
                alertDiv.classList.add('hidden');
            }, 5000);
        }

        function setLoading(loading) {
            isLoading = loading;
            const btn = document.getElementById('loginBtn');
            
            if (loading) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
                btn.disabled = true;
            } else {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                btn.disabled = false;
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isLoading) return;
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showAlert('Preencha email e senha', 'error');
                return;
            }
            
            setLoading(true);
            
            try {
                const result = await loginWithSupabase(email, password);
                
                if (result.success) {
                    showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                    
                    // Redirecionar para a página correta baseada no papel do usuário
                    const redirectUrl = result.redirectTo || (result.role === 'admin' ? 'admin.html' : 'index.html');
                    
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1500);
                } else {
                    showAlert('Erro: ' + (result.error || 'Email ou senha inválidos'), 'error');
                }
            } catch (error) {
                showAlert('Erro ao fazer login. Tente novamente.', 'error');
                console.error('Erro:', error);
            } finally {
                setLoading(false);
            }
        });

        // ============================================
        // VERIFICAR SESSÃO EXISTENTE
        // ============================================
        
        async function checkExistingSession() {
            const userSession = sessionStorage.getItem('barberflow_user');
            if (userSession) {
                try {
                    const user = JSON.parse(userSession);
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session) {
                        // Redirecionar baseado no papel
                        if (user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    } else {
                        sessionStorage.removeItem('barberflow_user');
                    }
                } catch (error) {
                    sessionStorage.removeItem('barberflow_user');
                }
            }
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        
        (async () => {
            await checkExistingSession();
        })();

        // Prevenir submit com Enter duplicado
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
